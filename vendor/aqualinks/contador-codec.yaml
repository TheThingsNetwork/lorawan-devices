# Uplink decoder decodes binary data uplink into a JSON object (optional)
# For documentation on writing encoders and decoders, see: https://thethingsstack.io/integrations/payload-formatters/javascript/
uplinkDecoder:
  fileName: contador.js
  # Uplink decoder decodes binary data uplink into a JSON object
  examples:
    - description: Aqualinks S1 standard uplink without alarms
      input:
        fPort: 1
        bytes:
          - 0x45
          - 0xE8
          - 0x03
          - 0x00
          - 0x00
          - 0x00
          - 0x00
          - 0x00
          - 0x00
      output:
        data:
          type: standard
          datalogger: false
          alarm_active: false
          alarm_burst: false
          alarm_leakage: false
          alarm_low_battery: false
          alarm_overflow: false
          alarm_reverse_flow: false
          alarm_wrong_installation: false
          battery_status: OK
          cumulativeFlow: 1000
          cumulativeFlowM3: 1
          water: 1

    - description: Aqualinks S1 standard uplink with leakage alarm
      input:
        fPort: 1
        bytes:
          - 0x50
          - 0xD0
          - 0x07
          - 0x00
          - 0x00
          - 0x00
          - 0x00
          - 0x00
          - 0x01
      output:
        data:
          type: standard
          datalogger: false
          alarm_active: true
          alarm_burst: false
          alarm_leakage: true
          alarm_low_battery: false
          alarm_overflow: false
          alarm_reverse_flow: false
          alarm_wrong_installation: false
          battery_status: OK
          cumulativeFlow: 2000
          cumulativeFlowM3: 2
          water: 2

