name: Aqualinks S1
description: LoRaWAN water meter for remote consumption monitoring.

hardwareVersions:
  - version: '1.x'
    numeric: 1

firmwareVersions:
  - version: '1.x'
    numeric: 1
    hardwareVersions:
      - '1.x'

    profiles:
      EU863-870:
        id: profile-eu868
        lorawanCertified: false
        codec: s1-codec

sensors:
  - water

dimensions:
  width: 80
  length: 110
  height: 80

battery:
  replaceable: true
  type: Lithium

operatingConditions:
  temperature:
    min: -10
    max: 65

ipCode: IP68

keyProvisioning:
  - custom
keySecurity: none

photos:
  main: s1.png
