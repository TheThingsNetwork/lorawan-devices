name: LoRaWAN® Wall Thermostat
description: The dnt LoRaWAN® Wall Thermostat (dnt-lw-wth) controls the heating or air conditioning of the room. It measures the room temperature and humidity and shows it on the integrated Display. For automatic adjustment of the room temperature, the user can configure three profiles with each up to ten temperature changes a day. Other features are the window-open detection, a holiday mode, an energy-saving mode and various configuration options through LoRaWAN downlinks. Through our low power design, the device consumes only 45 uA in default mode, which results in a battery lifetime of up to 5 years.

# Hardware versions (optional, use when you have revisions)
hardwareVersions:
  - version: '1.0'
    numeric: 1

# Firmware versions (at least one is mandatory)
firmwareVersions:
  - version: '1.0.11'
    numeric: 1
    hardwareVersions:
      - '1.0'
    profiles:
      EU863-870:
        id: dnt-profile
        lorawanCertified: true
        codec: dnt-lw-wth-codec
  - version: '1.1.0'
    numeric: 100
    hardwareVersions:
      - '1.0'
    profiles:
      EU863-870:
        id: dnt-profile
        lorawanCertified: true
        codec: dnt-lw-wth-codec-103
  - version: '1.2.6'
    numeric: 126
    hardwareVersions:
      - '1.0'
    profiles:
      EU863-870:
        id: dnt-profile-1-0-4
        lorawanCertified: true
        codec: dnt-lw-wth-codec-1-1-1

    # Firmware features (optional)
    # Valid values are: remote rejoin (trigger a join from the application layer), transmission interval (configure how
    # often he device sends a message).
    features:
      - remote rejoin
      - transmission interval

# Sensors that this device features (optional)
# Valid values are:
# 4-20 ma, accelerometer, altitude, analog input, auxiliary, barometer, battery, button, bvoc, co, co2, conductivity,
# current, digital input, dissolved oxygen, distance, dust, energy, gps, gyroscope, h2s, humidity, iaq, level, light,
# lightning, link, magnetometer, moisture, motion, no, no2, o3, particulate matter, ph, pir, pm2.5, pm10, potentiometer,
# power, precipitation, pressure, proximity, pulse count, pulse frequency, radar, rainfall, rssi, smart valve, snr, so2,
# solar radiation, sound, strain, surface temperature, temperature, tilt, time, tvoc, uv, vapor pressure, velocity,
# vibration, voltage, water potential, water, weight, wifi ssid, wind direction, wind speed.
sensors:
  - temperature
  - humidity

# Dimensions in mm (optional)
# Use width, height, length and/or diameter
dimensions:
  width: 85
  length: 85
  height: 25

# Weight in grams (optional)
weight: 140

# Operating conditions (optional)
operatingConditions:
  # Temperature (Celsius)
  temperature:
    min: 0
    max: 50
  # Relative humidity (fraction of 1)
  relativeHumidity:
    min: 0
    max: 0.97

# IP rating (optional)
ipCode: IP20

# Key provisioning (optional)
# Valid values are: custom (user can configure keys), join server and manifest.
keyProvisioning:
  - join server

# Key programming (optional)
# Valid values are: bluetooth, nfc, wifi, serial (when the user has a serial interface to set the keys)
# and firmware (when the user should change the firmware to set the keys).
keyProgramming:
  - firmware

# Firmware programming (optional)
# Valid values are: serial (when the user has a serial interface to update the firmware), fuota lorawan (when the device
# supports LoRaWAN FUOTA via standard interfaces) and fuota other (other wireless update mechanism).
firmwareProgramming:
  - serial
  - fuota lorawan

# Product and data sheet URLs (optional)
productURL: https://dnt.de/business/

# Commercial information
resellerURLs:
  - name: 'dnt'
    region:
      - European Union
    url: https://dnt.de/produkte/dnt-lorawan-wandthermostat-dnt-lw-wth/
msrp:
  EUR: 59.95

# Photos
photos:
  main: dnt-lw-wth-front-view.png
  other:
    - dnt-lw-wth-back-view.png
    - dnt-lw-wth-antracite.png
