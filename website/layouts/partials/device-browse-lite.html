{{ $devices := .devices }}
<div class="container" data-browse>
  <section style="padding: 24px 0 0;">
    <div class="search-bar" style="margin-top: 0;">
      <div class="search-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Search these devices…" data-search aria-label="Search devices" />
      </div>
      <select class="sort-select" data-sort aria-label="Sort devices">
        <option value="name">Name (A–Z)</option>
        <option value="vendor">Vendor (A–Z)</option>
      </select>
    </div>
  </section>

  <div style="padding: 24px 0 80px;">
    <div class="active-filters" data-chips hidden></div>
    <div class="results-meta">
      <span data-count><strong>{{ len $devices }}</strong> devices</span>
      <div class="view-toggle">
        <button data-view="grid" class="active" title="Tile view" aria-label="Tile view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button data-view="list" title="List view" aria-label="List view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="empty" data-empty hidden>
      <h3>No devices match</h3>
      <p>Try broadening your search.</p>
    </div>

    <div class="device-grid" data-grid>
      {{ range $devices.ByTitle }}
      {{ partial "device-card.html" . }}
      {{ end }}
    </div>
    <div class="device-list" data-list hidden></div>
  </div>
</div>
