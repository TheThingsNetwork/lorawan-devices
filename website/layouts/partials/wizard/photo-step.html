<div data-photo>
  <div class="s-grid">
    <div class="s-field span2">
      <label>Product photo — PNG with transparent background</label>
      <input type="file" accept="image/png,.png" data-photo-input />
      <span class="s-hint">The file is checked locally in your browser; nothing is uploaded. Repository rules: PNG, at most 2000 × 2000 px, transparent background.</span>
    </div>
  </div>
  <ul class="ck-list" data-photo-checks hidden></ul>
  <div class="photo-previews" data-photo-previews hidden>
    <div class="pp pp-light"><img alt="Preview on light background" /><span>light</span></div>
    <div class="pp pp-dark"><img alt="Preview on dark background" /><span>dark</span></div>
  </div>
  <p class="s-hint" data-photo-name hidden></p>
</div>
