{{ define "main" }}
<main>
  <section class="page-hero">
    <div class="container">
      <div class="crumbs" style="padding-top: 0;">
        <a href="{{ "" | absURL }}">Devices</a>
        <span class="sep">/</span>
        <span class="current">Tag: {{ .Title }}</span>
      </div>
      <h1>{{ .Title }}</h1>
      <p class="lede">{{ len .Pages }} device{{ if ne (len .Pages) 1 }}s{{ end }} tagged “{{ .Title }}” in the Device Repository for LoRaWAN®.</p>
    </div>
  </section>
  {{ partial "device-browse-lite.html" (dict "devices" .Pages) }}
</main>
{{ end }}
