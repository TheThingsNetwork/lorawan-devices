name = "lorawan-devices-submit"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ----------------------------------------------------------------------------
# Non-secret config. Secrets (GH_APP_ID, GH_APP_PRIVATE_KEY, TURNSTILE_SECRET)
# are set with `wrangler secret put NAME` — never commit them here.
#
# "Develop on B, ship A": this file is configured for Option B (push to a
# bot-owned fork, PR into upstream). To ship Option A in production, set
# PUSH_REPO = UPSTREAM_REPO and the same code opens an in-repo PR.
# ----------------------------------------------------------------------------

[vars]
# Option B (development / staging): push branches to the bot's fork.
PUSH_REPO = "ttn-device-bot/lorawan-devices"
# The PR always targets upstream. For Option A, set PUSH_REPO to this value.
UPSTREAM_REPO = "TheThingsNetwork/lorawan-devices"
BOT_NAME = "lorawan-devices bot"
BOT_EMAIL = "bot@users.noreply.github.com"
# Comma-separated allowlist of site origins permitted to call /api/submit.
ALLOWED_ORIGINS = "https://wienke.github.io,http://localhost:1313"

# GH_INSTALLATION_ID is the install of the App on PUSH_REPO. It's not secret;
# set it here once known (or as a secret if you prefer):
# GH_INSTALLATION_ID = "12345678"

# Optional: bind a KV namespace to enable rate limiting (per-IP + soft global).
# Create with `wrangler kv:namespace create RL`, then uncomment:
# [[kv_namespaces]]
# binding = "RL"
# id = "<kv-namespace-id>"
